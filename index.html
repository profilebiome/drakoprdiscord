<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comunidad Musical</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Oswald:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-space:  #030107; 
      --violet-glow: #6a0dad;
      --violet-neon: #b026ff;
      --violet-dark: #120224;
      --white: #ffffff;
      --black: #000000;
      --red-live: #ff0033;
      --text-muted: rgba(255, 255, 255, 0.75);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-space);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ── NEBULOSAS DE FONDO OSCURO ── */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      z-index: 0;
      pointer-events: none;
      animation: float 12s infinite ease-in-out alternate;
    }
    .nebula-1 {
      width: 45vw; height: 45vw;
      background: var(--violet-glow);
      top: -10%; left: -5%;
      opacity: 0.12;
    }
    .nebula-2 {
      width: 55vw; height: 55vw;
      background: #25033f;
      bottom: -20%; right: -5%;
      opacity: 0.15;
      animation-delay: -6s;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(40px) scale(1.05); }
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center; /* Añadido para asegurar centrado perfecto */
      margin: auto; /* Centrado extra */
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center; /* Añadido para forzar el centro de sus hijos */
      gap: 28px; 
      width: 100%;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── PERFIL DISCORD CON GLOW ── */
    .profile-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 4px;
    }

    .profile-avatar {
      width: 90px;
      height: 90px;
      background: linear-gradient(#1a0b2e, #1a0b2e) padding-box, 
                  linear-gradient(135deg, var(--violet-neon), var(--violet-glow), #ffffff) border-box;
      border: 3px solid transparent; 
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: avatarPulse 2.5s infinite alternate ease-in-out;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    @keyframes avatarPulse {
      0% {
        box-shadow: 0 0 15px rgba(106, 13, 173, 0.6), 
                    0 0 30px rgba(176, 38, 255, 0.4);
      }
      100% {
        box-shadow: 0 0 25px rgba(106, 13, 173, 1), 
                    0 0 55px rgba(176, 38, 255, 0.8),
                    0 0 80px rgba(106, 13, 173, 0.5);
      }
    }

    .profile-avatar:hover {
      transform: scale(1.08);
    }

    .profile-avatar svg {
      width: 100%;
      height: 100%;
      fill: var(--white);
      filter: drop-shadow(0 0 8px var(--violet-neon)) drop-shadow(0 0 15px var(--violet-glow));
    }

    /* ── ESTRUCTURA DEL MENÚ DESPLEGABLE ── */
    .dropdown-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    /* ── BOTÓN PRINCIPAL (TOGGLE) AJUSTADO ── */
    .btn-cta {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--white);
      font-family: 'Oswald', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      z-index: 2;
      overflow: hidden;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }

    .btn-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      padding: 1.5px; 
      background: linear-gradient(90deg, rgba(255,255,255,0.4), var(--violet-glow), rgba(0,0,0,0.8), rgba(255,255,255,0.4));
      background-size: 200% auto;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      transition: background-position 0.5s ease;
    }

    .btn-cta::after {
      content: '';
      position: absolute;
      inset: 1px;
      background: linear-gradient(135deg, #090314, #020005);
      border-radius: 11px;
      z-index: -1;
      transition: opacity 0.3s ease;
    }

    .btn-cta:hover::before {
      background-position: right center;
    }

    .btn-cta:hover {
      box-shadow: 0 12px 24px rgba(106, 13, 173, 0.4);
      transform: scale(1.02);
    }

    .btn-cta svg {
      width: 20px;
      height: 20px;
      fill: var(--white);
      transition: transform 0.3s ease;
    }

    /* ── CONTENIDO DEL MENÚ DESPLEGABLE ── */
    .dropdown-menu {
      position: absolute;
      top: 64px;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, #090314, #0d011c);
      border: 1px solid rgba(106, 13, 173, 0.5);
      border-radius: 12px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(106, 13, 173, 0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      
      opacity: 0;
      transform: translateY(-15px);
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .dropdown-menu.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* ── ELEMENTOS DENTRO DEL MENÚ ── */
    .dropdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      text-decoration: none;
      color: var(--white);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.2s ease, padding-left 0.2s ease;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover {
      background: rgba(106, 13, 173, 0.2);
      padding-left: 24px;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 0.5px;
    }

    .item-title svg {
      width: 16px;
      height: 16px;
      fill: var(--white);
    }

    .item-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── BOTÓN ROJO PARPADEANDO (LIVE) ── */
    .btn-live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red-live);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 6px;
      border: none;
      box-shadow: 0 0 12px rgba(255, 0, 51, 0.4);
      animation: livePulse 1.6s infinite ease-in-out;
      pointer-events: none;
    }

    .btn-live::before {
      content: '';
      width: 5px;
      height: 5px;
      background-color: var(--white);
      border-radius: 50%;
    }

    @keyframes livePulse {
      0% { transform: scale(1); box-shadow: 0 0 12px rgba(255, 0, 51, 0.5); opacity: 0.9; }
      50% { transform: scale(1.04); box-shadow: 0 0 20px rgba(255, 0, 51, 0.85); opacity: 1; }
      100% { transform: scale(1); box-shadow: 0 0 12px rgba(255, 0, 51, 0.5); opacity: 0.9; }
    }
  </style>
</head>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<canvas id="bg-canvas"></canvas>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const dropdownMenu = document.getElementById('dropdownMenu');
  const arrowIcon = document.getElementById('arrowIcon');

  menuToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdownMenu.classList.toggle('active');
    
    if (dropdownMenu.classList.contains('active')) {
      arrowIcon.style.transform = 'rotate(180deg)';
    } else {
      arrowIcon.style.transform = 'rotate(0deg)';
    }
  });

  document.addEventListener('click', (e) => {
    if (!dropdownMenu.contains(e.target) && !menuToggle.contains(e.target)) {
      dropdownMenu.classList.remove('active');
      arrowIcon.style.transform = 'rotate(0deg)';
    }
  });
</script>

<script>
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = [
    'rgba(255, 255, 255,', 
    'rgba(138, 43, 226,', 
    'rgba(25, 10, 45,', 
    'rgba(180, 140, 255,'
  ];

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.r  = Math.random() * 2 + 0.5;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.a  = Math.random() * 0.5 + 0.1;
      this.c  = COLORS[Math.floor(Math.random() * COLORS.length)];
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.c + this.a + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < 110; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.012)';
    ctx.lineWidth = 1;
    const step = 120;
    for (let x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(138, 43, 226, ${0.07 * (1 - dist / 140)})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
      particles[i].update();
      particles[i].draw();
    }

    requestAnimationFrame(loop);
  }
  loop();
</script>
