<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SERVER DRAKO | Comunidad</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060608;
      --bg2:       #0d0d14;
      --purple:    #5865F2;
      --violet:    #9C84EF;
      --glow:      #7289DA;
      --deep:      #1a1a2e;
      --border:    rgba(88,101,242,0.25);
      --text:      #e8eaf6;
      --muted:     #8b8fa8;
      --white:     #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── FONDO ANIMADO CANVAS (INTACTO) ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── NAVEGACIÓN ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
      height: 72px;
      background: rgba(6,6,8,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      color: var(--white);
      letter-spacing: 1px;
    }

    .nav-logo svg { width: 28px; height: 28px; }

    /* ── SECCIÓN PRINCIPAL (HERO MODERNO) ── */
    .hero {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px clamp(1.5rem, 6vw, 4rem) 60px;
    }

    .hero-badge {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--violet);
      background: rgba(156, 132, 239, 0.1);
      border: 1px solid rgba(156, 132, 239, 0.3);
      padding: 8px 16px;
      border-radius: 50px;
      margin-bottom: 1.5rem;
      animation: fadeDown 0.8s 0.1s ease both;
    }

    .main-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 30%, #9C84EF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      filter: drop-shadow(0 10px 30px rgba(88,101,242,0.2));
      animation: fadeDown 0.8s 0.2s ease both;
    }

    /* ── ECUALIZADOR ANIMADO ── */
    .eq-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 60px;
      margin: 2rem 0;
      animation: fadeDown 0.8s 0.3s ease both;
    }

    .eq-bar {
      width: 6px;
      border-radius: 4px;
      background: linear-gradient(to top, var(--purple), var(--violet));
      animation: eq var(--d, 0.9s) ease-in-out infinite alternate;
      box-shadow: 0 0 12px rgba(88,101,242,0.4);
    }

    @keyframes eq {
      from { height: 10px; opacity: 0.5; }
      to   { height: var(--h, 40px); opacity: 1; }
    }

    /* ── BOTÓN DE ACCIÓN (CTA) ── */
    .cta-wrap {
      margin-top: 1rem;
      animation: fadeDown 0.8s 0.4s ease both;
    }

    .btn-cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #5865F2, #9C84EF);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 18px 44px;
      border-radius: 16px;
      text-decoration: none;
      box-shadow: 0 0 40px rgba(88,101,242,0.3), 0 8px 24px rgba(0,0,0,0.4);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
    }

    .btn-cta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-cta:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 0 60px rgba(88,101,242,0.5), 0 12px 32px rgba(0,0,0,0.5); 
    }
    .btn-cta:hover::after { opacity: 1; }
    .btn-cta:active { transform: translateY(0); }

    .btn-cta svg { width: 24px; height: 24px; fill: #fff; flex-shrink: 0; position: relative; z-index: 2; }
    .btn-cta span { position: relative; z-index: 2; }

    /* ── PIE DE PÁGINA (FOOTER) ── */
    footer {
      position: relative; 
      z-index: 1;
      padding: 2rem clamp(1.5rem, 5vw, 4rem);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center; /* Centrado para estilo minimalista */
      font-size: 0.9rem;
      color: var(--muted);
      background: rgba(6,6,8,0.4);
      backdrop-filter: blur(10px);
    }

    footer .nav-logo { font-size: 1rem; color: var(--muted); }
    footer .nav-logo svg { filter: grayscale(100%) opacity(0.7); }

    /* ── ANIMACIONES DE ELEMENTOS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
  <div class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="url(#logoGrad)"/>
      <path d="M10 20 Q12 10 16 14 Q20 18 22 8" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <circle cx="10" cy="20" r="2" fill="white"/>
      <circle cx="22" cy="8" r="2" fill="white"/>
      <defs>
        <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32">
          <stop offset="0%" stop-color="#5865F2"/>
          <stop offset="100%" stop-color="#9C84EF"/>
        </linearGradient>
      </defs>
    </svg>
    SERVER DRAKO
  </div>
</nav>

<section class="hero">

  <h1 class="main-title">Comunidad para Productores</h1>

  <div class="eq-wrap" aria-hidden="true">
    <div class="eq-bar" style="--h:22px;--d:0.7s"></div>
    <div class="eq-bar" style="--h:38px;--d:0.9s"></div>
    <div class="eq-bar" style="--h:50px;--d:1.1s"></div>
    <div class="eq-bar" style="--h:34px;--d:0.8s"></div>
    <div class="eq-bar" style="--h:46px;--d:1.3s"></div>
    <div class="eq-bar" style="--h:28px;--d:0.65s"></div>
    <div class="eq-bar" style="--h:52px;--d:1.0s"></div>
    <div class="eq-bar" style="--h:40px;--d:0.85s"></div>
    <div class="eq-bar" style="--h:30px;--d:1.2s"></div>
    <div class="eq-bar" style="--h:48px;--d:0.75s"></div>
    <div class="eq-bar" style="--h:20px;--d:0.95s"></div>
    <div class="eq-bar" style="--h:42px;--d:1.15s"></div>
  </div>

  <div class="cta-wrap">
    <a href="https://discord.gg/AeMkphYHz" target="_blank" class="btn-cta">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 245 240">
        <path d="M104.4 103.9c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.2-5 10.2-11.1.1-6.1-4.5-11.1-10.2-11.1zm36.5 0c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.2-5 10.2-11.1s-4.5-11.1-10.2-11.1z"/>
        <path d="M189.5 20h-134C44.2 20 35 29.2 35 40.6v135.2c0 11.4 9.2 20.6 20.5 20.6h113.4l-5.3-18.5 12.8 11.9 12.1 11.2 21.5 19V40.6c0-11.4-9.2-20.6-20.5-20.6zm-38.6 130.6s-3.6-4.3-6.6-8.1c13.1-3.7 18.1-11.9 18.1-11.9-4.1 2.7-8 4.6-11.5 5.9-5 2.1-9.8 3.5-14.5 4.3-9.6 1.8-18.4 1.3-25.9-.1-5.7-1.1-10.6-2.7-14.7-4.3-2.3-.9-4.8-2-7.3-3.4-.3-.2-.6-.3-.9-.5-.2-.1-.3-.2-.4-.3-1.8-1-2.8-1.7-2.8-1.7s4.8 8 17.5 11.8c-3 3.8-6.7 8.3-6.7 8.3-22.1-.7-30.5-15.2-30.5-15.2 0-32.2 14.4-58.3 14.4-58.3 14.4-10.8 28.1-10.5 28.1-10.5l1 1.2c-18 5.2-26.3 13.1-26.3 13.1s2.2-1.2 5.9-2.9c10.7-4.7 19.2-6 22.7-6.3.6-.1 1.1-.2 1.7-.2 6.1-.8 13-.9 20.2-.1 9.5 1.1 19.7 3.9 30.1 9.6 0 0-7.9-7.5-24.9-12.7l1.4-1.6s13.7-.3 28.1 10.5c0 0 14.4 26.1 14.4 58.3 0 0-8.5 14.5-30.6 15.2z"/>
      </svg>
      <span>Acceder a Discord</span>
    </a>
  </div>
</section>

<footer>
  <div class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
      <rect width="32" height="32" rx="8" fill="url(#logoGrad2)"/>
      <path d="M10 20 Q12 10 16 14 Q20 18 22 8" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <circle cx="10" cy="20" r="2" fill="white"/>
      <circle cx="22" cy="8" r="2" fill="white"/>
      <defs>
        <linearGradient id="logoGrad2" x1="0" y1="0" x2="32" y2="32">
          <stop offset="0%" stop-color="#5865F2"/>
          <stop offset="100%" stop-color="#9C84EF"/>
        </linearGradient>
      </defs>
    </svg>
    SERVER DRAKO
  </div>
</footer>

<script>
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['rgba(88,101,242,', 'rgba(156,132,239,', 'rgba(114,137,218,'];

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.r  = Math.random() * 1.8 + 0.4;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.a  = Math.random() * 0.5 + 0.1;
      this.c  = COLORS[Math.floor(Math.random() * COLORS.length)];
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.c + this.a + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < 120; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);

    // Líneas sutiles de fondo
    ctx.strokeStyle = 'rgba(88,101,242,0.04)';
    ctx.lineWidth = 1;
    const step = 80;
    for (let x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Conectar partículas cercanas
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(88,101,242,${0.07 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
      particles[i].update();
      particles[i].draw();
    }

    requestAnimationFrame(loop);
  }
  loop();
</script>

</body>
</html>
