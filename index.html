<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comunidad Musical</title>
  <!-- Tipografías: Bebas Neue para el estilo urbano de los botones, Syne para otros textos artísticos e Inter para lectura limpia -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-space:  #030107; /* Violeta ultra oscuro base */
      --violet-glow: #6a0dad;
      --violet-dark: #120224;
      --white: #ffffff;
      --black: #000000;
      --red-live: #ff0033;
      --text-muted: rgba(255, 255, 255, 0.75);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-space);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ── NEBULOSAS DE FONDO OSCURO ── */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      z-index: 0;
      pointer-events: none;
      animation: float 12s infinite ease-in-out alternate;
    }
    .nebula-1 {
      width: 45vw; height: 45vw;
      background: var(--violet-glow);
      top: -10%; left: -5%;
      opacity: 0.12;
    }
    .nebula-2 {
      width: 55vw; height: 55vw;
      background: #25033f;
      bottom: -20%; right: -5%;
      opacity: 0.15;
      animation-delay: -6s;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(40px) scale(1.05); }
    }

    /* ── FONDO ANIMADO CANVAS (EFECTOS BLANCO/NEGRO/VIOLETA) ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── CONTENEDOR PRINCIPAL CENTRAL ── */
    .hero {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECCIÓN DE FOTO DE PERFIL (DISCORD PROFILE CON BORDE VIOLETA/BLANCO PRENDIDO) ── */
    .profile-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: -4px;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      /* Color Blurple oficial interno combinado con un borde de gradiente fusionado Violeta y Blanco */
      background: linear-gradient(#5865F2, #5865F2) padding-box, 
                  linear-gradient(135deg, #ffffff, var(--violet-glow), #ffffff) border-box;
      border: 3px solid transparent; 
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      /* Efecto de iluminación/prende fusionando blanco y violeta */
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 
                  0 0 40px rgba(106, 13, 173, 0.8), 
                  0 12px 40px rgba(0, 0, 0, 0.7);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
    }

    .profile-avatar:hover {
      transform: scale(1.08);
      /* Intensifica el brillo al pasar el cursor */
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.9), 
                  0 0 55px rgba(106, 13, 173, 1), 
                  0 12px 45px rgba(0, 0, 0, 0.8);
    }

    .profile-avatar svg {
      width: 100%;
      height: 100%;
      fill: var(--white);
    }

    /* ── TARJETAS DE CONTENIDO WEB PROFESIONAL ── */
    .feature-card {
      background: rgba(4, 1, 10, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s ease;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      border-color: rgba(138, 43, 226, 0.4);
    }

    /* ── BOTONES PRINCIPALES (LETRA URBANA BEBAS NUEUE) ── */
    .btn-cta {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif; /* Nueva tipografía urbana */
      font-size: 1.6rem; /* Ajustado el tamaño para la nueva tipografía */
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 30px;
      width: 100%;
      border-radius: 14px;
      text-decoration: none;
      z-index: 1;
      overflow: hidden;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }

    /* Borde líquido minimalista (Blanco, Violeta, Negro) */
    .btn-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      padding: 1.5px; /* Grosor del borde */
      background: linear-gradient(90deg, rgba(255,255,255,0.4), var(--violet-glow), rgba(0,0,0,0.8), rgba(255,255,255,0.4));
      background-size: 200% auto;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      transition: background-position 0.5s ease;
    }

    /* Fondo oscuro interno */
    .btn-cta::after {
      content: '';
      position: absolute;
      inset: 1px;
      background: linear-gradient(135deg, #090314, #020005);
      border-radius: 13px;
      z-index: -1;
      transition: opacity 0.3s ease;
    }

    .btn-cta:hover::before {
      background-position: right center;
    }

    .btn-cta:hover {
      box-shadow: 0 12px 24px rgba(106, 13, 173, 0.3);
      transform: scale(1.01);
    }

    .btn-cta svg {
      width: 24px;
      height: 24px;
      fill: var(--white);
      transition: transform 0.3s ease;
    }

    .btn-cta:hover svg {
      transform: scale(1.1) rotate(-3deg);
    }

    /* ── FILA DE DESCRIPCIÓN Y BOTÓN LIVE ── */
    .info-wrapper {
      display: flex;
      flex-direction: column; 
      align-items: center;
      justify-content: center;
      gap: 10px; 
      width: 100%;
    }

    .description {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      text-align: center;
    }

    /* ── BOTÓN ROJO PARPADEANDO (LIVE) ── */
    .btn-live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red-live);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 6px;
      border: none;
      box-shadow: 0 0 12px rgba(255, 0, 51, 0.4);
      animation: livePulse 1.6s infinite ease-in-out;
      cursor: pointer;
    }

    .btn-live::before {
      content: '';
      width: 6px;
      height: 6px;
      background-color: var(--white);
      border-radius: 50%;
    }

    @keyframes livePulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 12px rgba(255, 0, 51, 0.5);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.04);
        box-shadow: 0 0 20px rgba(255, 0, 51, 0.85);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 12px rgba(255, 0, 51, 0.5);
        opacity: 0.9;
      }
    }
  </style>
</head>
<body>

<script>
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = [
    'rgba(255, 255, 255,', 
    'rgba(138, 43, 226,', 
    'rgba(25, 10, 45,', 
    'rgba(180, 140, 255,'
  ];

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.r  = Math.random() * 2 + 0.5;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.a  = Math.random() * 0.5 + 0.1;
      this.c  = COLORS[Math.floor(Math.random() * COLORS.length)];
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.c + this.a + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < 110; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.012)';
    ctx.lineWidth = 1;
    const step = 120;
    for (let x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(138, 43, 226, ${0.07 * (1 - dist / 140)})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
      particles[i].update();
      particles[i].draw();
    }

    requestAnimationFrame(loop);
  }
  loop();
</script>
